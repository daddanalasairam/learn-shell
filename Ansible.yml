#Conditions
- name: Condition
  hosts: all
  connection: local
  vars:
    to_install: true

  tasks:
    - name: Print OS Rehat
      ansible.builtin.debug:
        msg: Rehat
      when: os == "redhat"

    - name : Print OS Ubuntu
      ansible.builtin.debug:
        msg: Ubuntu
      when: os == "ubuntu"

    - name: Get reminder
      ansible.builtin.shell: echo {{ {{ number }}%2 }}
      register: reminder

    - name: Print Even Number
      ansible.builtin.debug:
        msg: Number {{ number }} is even
      when: reminder.stdout == "0"

    - name: Boolean Condition
      ansible.builtin.debug:
        msg: to_install - "true"
        when: to_install

